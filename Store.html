<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Projects — Nikita Kotrelev</title>
  <meta name="description" content="Selected projects by Nikita Kotrelev — cinematography, installations, experimental rigs." />
  <link rel="icon" href="img/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/favicon_180x180.png" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0b0b">

  <style>
    :root{
      --bg:#f5f5f5;
      --fg:#0b0b0b;
      --muted:#6b7280;
      --card:#ffffff;
      --border:#e7e7e7;
      --shadow:0 18px 40px rgba(0,0,0,.08);

      --safe-top:max(env(safe-area-inset-top),0px);
      --safe-bot:max(env(safe-area-inset-bottom),0px);
      --header-h:64px;
    }

    @font-face{
      font-family:'Afacad Flux';
      src: local('Afacad Flux Regular'),
           url('fonts/AfacadFlux-Regular.woff2') format('woff2'),
           url('fonts/AfacadFlux-Regular.woff') format('woff');
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    html,body{height:100%}
    html{color-scheme:light}

    body{
      margin:0;
      font-family:'Afacad Flux',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,'Helvetica Neue',Arial,'Noto Sans',sans-serif;
      background:var(--bg);
      color:var(--fg);
      min-height:100dvh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      -webkit-tap-highlight-color:transparent;
    }

    /* ===== Header ===== */
    header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:60;
      padding-top:var(--safe-top);
      height:var(--header-h);
      backdrop-filter:saturate(180%) blur(10px);
      background:rgba(245,245,245,.82);
      border-bottom:1px solid var(--border);
      box-sizing:border-box;
    }

    .nav{
      max-width:1320px;
      margin:0 auto;
      padding:12px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      box-sizing:border-box;
    }

    .brand{
      font-weight:700;
      letter-spacing:.12em;
      text-decoration:none;
      color:var(--fg);
      white-space:nowrap;
      flex:0 0 auto;
      font-size:13px;
      text-transform:uppercase;
    }

    .links{
      display:flex;
      gap:10px;
      align-items:center;
      overflow-x:auto;
      overscroll-behavior-inline:contain;
      scrollbar-width:none;
      max-width:100%;
    }
    .links::-webkit-scrollbar{display:none}

    .links a{
      color:var(--fg);
      text-decoration:none;
      opacity:.85;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      font-size:14px;
      flex:0 0 auto;
    }

    .links a:hover{
      opacity:1;
      background:rgba(0,0,0,.04);
    }

    .links a[aria-current="page"]{
      background:rgba(0,0,0,.06);
      opacity:1;
    }

    /* ===== Hero ===== */
  .page-hero{
  padding-top:calc(var(--header-h) + 64px);
  padding-bottom:28px;
  max-width:1320px;
  margin:0 auto;
  padding-inline:24px;
  box-sizing:border-box;
  text-align:center;
}

    .page-hero h1{
  font-size:clamp(30px,4vw,52px);
  margin:0;
  line-height:1.05;
  letter-spacing:-.02em;
}

    .page-hero p{
      color:var(--muted);
      font-size:clamp(14px,1.8vw,18px);
      margin:0;
      max-width:70ch;
      line-height:1.5;
    }

    /* ===== Projects grid ===== */
    .projects{
      max-width:1320px;
      margin:0 auto 72px;
      padding:0 24px;
      display:grid;
      gap:26px;
      grid-template-columns:repeat(3, minmax(0,1fr));
      align-items:start;
      box-sizing:border-box;
    }

    .project{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .project a{
      color:inherit;
      text-decoration:none;
      display:block;
    }

    .tile{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:0;
      padding:22px 22px 28px;
      min-height:520px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
      transition:transform .25s ease, box-shadow .25s ease;
      overflow:hidden;
    }

    .tile:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow);
    }

    .meta{
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:12px;
      color:var(--fg);
      opacity:.9;
      margin-bottom:12px;
    }

    .thumb{
      margin-top:10px;
      flex:1;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:transparent;
    }

    .thumb img{
      width:100%;
      max-width:420px;
      max-height:320px;
      height:auto;
      object-fit:contain;
      display:block;
      transition:transform .5s ease;
    }

    .tile:hover .thumb img{
      transform:scale(1.02);
    }

    .caption{
      padding:2px 2px 0;
      display:grid;
      gap:6px;
    }

    .name{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.25;
      color:var(--fg);
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    /* ===== Footer ===== */
    footer{
      border-top:1px solid var(--border);
      color:var(--muted);
      padding:24px;
      padding-bottom:calc(24px + var(--safe-bot));
      box-sizing:border-box;
      background:var(--bg);
    }

    footer .row{
      max-width:1320px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 24px;
      box-sizing:border-box;
    }

    /* ===== Responsive ===== */
    @media(max-width:1100px){
      .projects{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .tile{
        min-height:500px;
      }
    }

    @media(max-width:740px){
      .projects{
        grid-template-columns:1fr;
      }
      .tile{
        min-height:460px;
      }
      .thumb img{
        max-height:300px;
      }
    }

    @media(max-width:640px){
      :root{--header-h:auto;}

      header{
        position:sticky;
        height:auto;
        padding-bottom:10px;
      }

      .nav{
        padding:12px 12px;
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }

      .brand{
        font-size:12px;
      }

      .links{
        width:100%;
        flex-wrap:wrap;
        overflow:visible;
        gap:8px;
      }

      .links a{
        font-size:14px;
        padding:10px 12px;
      }

      .page-hero{
  padding-top:18px;
  padding-inline:12px;
  text-align:center;
}

      .page-hero h1{
        font-size:34px;
        line-height:1.05;
      }

      .page-hero p{
        font-size:14px;
        line-height:1.45;
      }

      .projects{
        padding:0 12px;
        margin-bottom:40px;
      }

      footer .row{
        flex-direction:column;
        align-items:flex-start;
        padding:0 12px;
      }

      footer{
        padding:20px 12px calc(20px + var(--safe-bot));
      }
    }

    @media (prefers-reduced-motion: reduce){
      .tile:hover{transform:none}
      .tile:hover .thumb img{transform:none}
    }
  </style>
</head>

<body>
  <header>
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="index.html">NIKITA KOTRELEV</a>
      <div class="links" role="navigation" aria-label="Primary links">
        <a href="Video.html">Video</a>
        <a href="Projects.html" aria-current="page">Projects</a>
        <a href="About me.html">About</a>
        <a href="Store.html">Store</a>
      </div>
    </nav>
  </header>

  <div class="page-hero">
    <h1>Projects</h1>
    
  </div>

  <section class="projects" aria-label="Projects list">

    <article class="project">
      <a href="project2024_robotdog.html">
        <div class="tile">
          <div class="meta">NIKITA KOTRELEV</div>
          <div class="thumb">
            <img src="img/FullSizeRender_1_.jpg" alt="France — project thumbnail" loading="lazy" decoding="async">
          </div>
        </div>
        <div class="caption">
          <p class="name">France</p>
        </div>
      </a>
    </article>

    <article class="project">
      <a href="island.html">
        <div class="tile">
          <div class="meta">NIKITA KOTRELEV</div>
          <div class="thumb">
            <img src="img/исландлия маша.png" alt="Island 2025 — thumbnail" loading="lazy" decoding="async">
          </div>
        </div>
        <div class="caption">
          <p class="name">Island 2025</p>
        </div>
      </a>
    </article>

    <article class="project">
      <a href="Morocco.html">
        <div class="tile">
          <div class="meta">NIKITA KOTRELEV</div>
          <div class="thumb">
            <img src="img/marocco 11.png" alt="Morocco — project thumbnail" loading="lazy" decoding="async">
          </div>
        </div>
        <div class="caption">
          <p class="name">Morocco</p>
        </div>
      </a>
    </article>

    <article class="project">
      <a href="fashion.html">
        <div class="tile">
          <div class="meta">NIKITA KOTRELEV</div>
          <div class="thumb">
            <img src="img/IMG_1601.JPG" alt="Fashion — thumbnail" loading="lazy" decoding="async">
          </div>
        </div>
        <div class="caption">
          <p class="name">Fashion</p>
        </div>
      </a>
    </article>

  </section>

  <footer>
    <div class="row">
      <span>© <span id="year"></span> Nikita Kotrelev</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
