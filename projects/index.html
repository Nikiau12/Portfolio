<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Projects — Nikita Kotrelev</title>
  <meta name="description" content="Selected projects by Nikita Kotrelev — cinematography, installations, experimental rigs." />
  <link rel="icon" href="/img/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="/img/favicon_180x180.png" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0b0b0b">

  <style>
    :root{
      --bg:#f5f5f5;
      --fg:#0b0b0b;
      --muted:#6b7280;
      --card:#ffffff;
      --border:#e7e7e7;
      --shadow:0 18px 40px rgba(0,0,0,.08);

      --safe-top:max(env(safe-area-inset-top),0px);
      --safe-bot:max(env(safe-area-inset-bottom),0px);
      --header-h:64px;
    }

    @font-face{
      font-family:'Afacad Flux';
      src: local('Afacad Flux Regular'),
           url('/fonts/AfacadFlux-Regular.woff2') format('woff2'),
           url('/fonts/AfacadFlux-Regular.woff') format('woff');
      font-weight:400;
      font-style:normal;
      font-display:swap;
    }

    html,body{height:100%}
    html{color-scheme:light}

    body{
      margin:0;
      font-family:'Afacad Flux',system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,'Helvetica Neue',Arial,'Noto Sans',sans-serif;
      background:var(--bg);
      color:var(--fg);
      min-height:100dvh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      -webkit-tap-highlight-color:transparent;
    }

    /* ===== Header ===== */
    header{
      position:fixed;
      top:0;
      left:0;
      right:0;
      z-index:60;
      padding-top:var(--safe-top);
      height:var(--header-h);
      backdrop-filter:saturate(180%) blur(10px);
      background:rgba(245,245,245,.82);
      border-bottom:1px solid var(--border);
      box-sizing:border-box;
    }

    .nav{
      max-width:1320px;
      margin:0 auto;
      padding:12px 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      box-sizing:border-box;
    }

    .brand{
      font-weight:700;
      letter-spacing:.12em;
      text-decoration:none;
      color:var(--fg);
      white-space:nowrap;
      flex:0 0 auto;
      font-size:13px;
      text-transform:uppercase;
    }

    .links{
      display:flex;
      gap:10px;
      align-items:center;
      overflow-x:auto;
      overscroll-behavior-inline:contain;
      scrollbar-width:none;
      max-width:100%;
    }
    .links::-webkit-scrollbar{display:none}

    .links a{
      color:var(--fg);
      text-decoration:none;
      opacity:.85;
      padding:8px 12px;
      border-radius:999px;
      white-space:nowrap;
      font-size:14px;
      flex:0 0 auto;
    }

    .links a:hover{
      opacity:1;
      background:rgba(0,0,0,.04);
    }

    .links a[aria-current="page"]{
      background:rgba(0,0,0,.06);
      opacity:1;
    }

    /* ===== Hero ===== */
  .page-hero{
  padding-top:calc(var(--header-h) + 64px);
  padding-bottom:28px;
  max-width:1320px;
  margin:0 auto;
  padding-inline:24px;
  box-sizing:border-box;
  text-align:center;
}

    .page-hero h1{
  font-size:clamp(30px,4vw,52px);
  margin:0;
  line-height:1.05;
  letter-spacing:-.02em;
}

    .page-hero p{
      color:var(--muted);
      font-size:clamp(14px,1.8vw,18px);
      margin:0;
      max-width:70ch;
      line-height:1.5;
    }

    .project-tabs{
      max-width:1320px;
      margin:0 auto 28px;
      padding:0 24px;
      box-sizing:border-box;
      display:flex;
      justify-content:center;
    }

    .project-tabs__list{
      display:inline-flex;
      align-items:center;
      gap:4px;
      padding:4px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.52);
    }

    .project-tabs__button{
      appearance:none;
      border:0;
      background:transparent;
      color:var(--fg);
      min-width:96px;
      padding:10px 18px;
      font:inherit;
      font-size:15px;
      line-height:1;
      cursor:pointer;
      opacity:.62;
      transition:background .2s ease, opacity .2s ease;
    }

    .project-tabs__button:hover{
      opacity:1;
      background:rgba(0,0,0,.04);
    }

    .project-tabs__button[aria-selected="true"]{
      background:#111;
      color:#fff;
      opacity:1;
    }

    .project-panel[hidden]{
      display:none;
    }

    /* ===== Projects grid ===== */
    .projects{
      max-width:1320px;
      margin:0 auto 72px;
      padding:0 24px;
      display:grid;
      gap:26px;
      grid-template-columns:repeat(3, minmax(0,1fr));
      align-items:start;
      box-sizing:border-box;
    }

    .project{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .project a{
      color:inherit;
      text-decoration:none;
      display:block;
    }

    .tile{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:0;
      padding:22px 22px 28px;
      min-height:520px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      box-shadow:0 10px 24px rgba(0,0,0,.06);
      transition:transform .25s ease, box-shadow .25s ease;
      overflow:hidden;
    }

    .tile:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow);
    }

    .meta{
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:12px;
      color:var(--fg);
      opacity:.9;
      margin-bottom:12px;
    }

    .thumb{
      margin-top:10px;
      flex:1;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:transparent;
    }

    .thumb img{
      width:100%;
      max-width:420px;
      max-height:320px;
      height:auto;
      object-fit:contain;
      display:block;
      transition:transform .5s ease;
    }

    .tile:hover .thumb img{
      transform:scale(1.02);
    }

    .caption{
      padding:2px 2px 0;
      display:grid;
      gap:6px;
    }

    .name{
      margin:0;
      font-size:15px;
      font-weight:600;
      line-height:1.25;
      color:var(--fg);
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    .design-cover{
      width:min(76%, 260px);
      aspect-ratio:3/4.2;
      background:#1f314b;
      color:#d6b15e;
      display:grid;
      align-content:start;
      justify-items:end;
      padding:22px 18px;
      box-sizing:border-box;
      position:relative;
      overflow:hidden;
    }

    .design-cover::before{
      content:"";
      position:absolute;
      left:-34%;
      top:24%;
      width:96%;
      aspect-ratio:1;
      border-radius:50%;
      border:26px solid #b7543e;
      opacity:.9;
    }

    .design-cover::after{
      content:"";
      position:absolute;
      right:12px;
      bottom:12px;
      width:22px;
      height:14px;
      border:1px solid currentColor;
      box-sizing:border-box;
    }

    .design-cover__title{
      position:relative;
      z-index:1;
      text-align:right;
      font-family:Georgia, 'Times New Roman', serif;
      font-size:20px;
      line-height:.92;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .design-cover__title small{
      display:block;
      margin-top:4px;
      font-size:8px;
      line-height:1.05;
      letter-spacing:.08em;
    }

    .empty-panel{
      max-width:1320px;
      margin:0 auto 72px;
      padding:0 24px;
      box-sizing:border-box;
    }

    .empty-panel__inner{
      min-height:360px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.46);
      display:grid;
      place-items:center;
      text-align:center;
      padding:48px 24px;
      box-sizing:border-box;
    }

    .empty-panel__inner p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.5;
    }

    .empty-panel__inner strong{
      display:block;
      margin-bottom:6px;
      color:var(--fg);
      font-size:18px;
      font-weight:600;
    }

    /* ===== Footer ===== */
    footer{
      border-top:1px solid var(--border);
      color:var(--muted);
      padding:24px;
      padding-bottom:calc(24px + var(--safe-bot));
      box-sizing:border-box;
      background:var(--bg);
    }

    footer .row{
      max-width:1320px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 24px;
      box-sizing:border-box;
    }

    /* ===== Responsive ===== */
    @media(max-width:1100px){
      .projects{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }
      .tile{
        min-height:500px;
      }
    }

    @media(max-width:740px){
      .projects{
        grid-template-columns:1fr;
      }
      .tile{
        min-height:460px;
      }
      .thumb img{
        max-height:300px;
      }
    }

    @media(max-width:640px){
      :root{--header-h:auto;}

      header{
        position:sticky;
        height:auto;
        padding-bottom:10px;
      }

      .nav{
        padding:12px 12px;
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
      }

      .brand{
        font-size:12px;
      }

      .links{
        width:100%;
        flex-wrap:wrap;
        overflow:visible;
        gap:8px;
      }

      .links a{
        font-size:14px;
        padding:10px 12px;
      }

      .page-hero{
  padding-top:18px;
  padding-inline:12px;
  text-align:center;
}

      .page-hero h1{
        font-size:34px;
        line-height:1.05;
      }

      .page-hero p{
        font-size:14px;
        line-height:1.45;
      }

      .project-tabs{
        padding:0 12px;
        justify-content:flex-start;
        overflow-x:auto;
      }

      .project-tabs__list{
        width:100%;
      }

      .project-tabs__button{
        flex:1 1 0;
        min-width:0;
        padding:11px 12px;
      }

      .projects{
        padding:0 12px;
        margin-bottom:40px;
      }

      .empty-panel{
        padding:0 12px;
        margin-bottom:40px;
      }

      footer .row{
        flex-direction:column;
        align-items:flex-start;
        padding:0 12px;
      }

      footer{
        padding:20px 12px calc(20px + var(--safe-bot));
      }
    }

    @media (prefers-reduced-motion: reduce){
      .tile:hover{transform:none}
      .tile:hover .thumb img{transform:none}
    }
  </style>
  <link rel="stylesheet" href="/site-nav.css">
  <link rel="stylesheet" href="/cookie-consent.css">
</head>

<body>
  <header>
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="/">NIKITA KOTRELEV</a>
      <div class="links" role="navigation" aria-label="Primary links">
        <a href="/book/">Book a photoshoot</a>
          <a href="/video/">Video</a>
          <a href="/projects/" aria-current="page">Projects</a>
          <a href="/about/">About</a>
          <a href="/store/">Store</a>
      </div>
    </nav>
  </header>

  <div class="page-hero">
    <h1>Projects</h1>

  </div>

  <div class="project-tabs" aria-label="Project categories">
    <div class="project-tabs__list" role="tablist" aria-label="Project categories">
      <button class="project-tabs__button" id="tab-photos" type="button" role="tab" aria-selected="true" aria-controls="panel-photos" data-project-tab="photos">Photos</button>
      <button class="project-tabs__button" id="tab-design" type="button" role="tab" aria-selected="false" aria-controls="panel-design" data-project-tab="design">Design</button>
    </div>
  </div>

  <section class="project-panel" id="panel-photos" role="tabpanel" aria-labelledby="tab-photos" data-project-panel="photos">
    <div class="projects" aria-label="Photo projects list">

      <article class="project">
        <a href="/projects/robotdog/">
          <div class="tile">
            <div class="meta">NIKITA KOTRELEV</div>
            <div class="thumb">
              <img src="/img/FullSizeRender_1_.jpg" alt="France — project thumbnail" loading="lazy" decoding="async">
            </div>
          </div>
          <div class="caption">
            <p class="name">France</p>
          </div>
        </a>
      </article>

      <article class="project">
        <a href="/projects/island/">
          <div class="tile">
            <div class="meta">NIKITA KOTRELEV</div>
            <div class="thumb">
              <img src="/img/исландлия маша.png" alt="Island 2025 — thumbnail" loading="lazy" decoding="async">
            </div>
          </div>
          <div class="caption">
            <p class="name">Iceland 2025</p>
          </div>
        </a>
      </article>

      <article class="project">
        <a href="/projects/morocco/">
          <div class="tile">
            <div class="meta">NIKITA KOTRELEV</div>
            <div class="thumb">
              <img src="/img/marocco 11.png" alt="Morocco — project thumbnail" loading="lazy" decoding="async">
            </div>
          </div>
          <div class="caption">
            <p class="name">Morocco</p>
          </div>
        </a>
      </article>

      <article class="project">
        <a href="/projects/fashion/">
          <div class="tile">
            <div class="meta">NIKITA KOTRELEV</div>
            <div class="thumb">
              <img src="/img/IMG_1601.JPG" alt="Fashion — thumbnail" loading="lazy" decoding="async">
            </div>
          </div>
          <div class="caption">
            <p class="name">Fashion</p>
          </div>
        </a>
      </article>

    </div>
  </section>

  <section class="project-panel" id="panel-design" role="tabpanel" aria-labelledby="tab-design" data-project-panel="design" hidden>
    <div class="projects" aria-label="Design projects list">

      <article class="project">
        <a href="/projects/passport/">
          <div class="tile">
            <div class="meta">DESIGN CASE</div>
            <div class="thumb">
              <div class="design-cover" aria-hidden="true">
                <div class="design-cover__title">Russia<small>Passport<br>Passport</small></div>
              </div>
            </div>
          </div>
          <div class="caption">
            <p class="name">The New Passport of Russia</p>
          </div>
        </a>
      </article>

    </div>
  </section>

  <footer>
    <div class="row">
      <span>© <span id="year"></span> Nikita Kotrelev</span>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function(){
      const tabs = Array.from(document.querySelectorAll('[data-project-tab]'));
      const panels = Array.from(document.querySelectorAll('[data-project-panel]'));
      if(!tabs.length || !panels.length) return;

      function activate(tabName){
        tabs.forEach((tab)=>{
          const active = tab.dataset.projectTab === tabName;
          tab.setAttribute('aria-selected', String(active));
          tab.tabIndex = active ? 0 : -1;
        });

        panels.forEach((panel)=>{
          panel.hidden = panel.dataset.projectPanel !== tabName;
        });
      }

      tabs.forEach((tab, index)=>{
        tab.addEventListener('click', ()=>activate(tab.dataset.projectTab));
        tab.addEventListener('keydown', (event)=>{
          if(event.key !== 'ArrowLeft' && event.key !== 'ArrowRight') return;
          event.preventDefault();
          const dir = event.key === 'ArrowRight' ? 1 : -1;
          const next = tabs[(index + dir + tabs.length) % tabs.length];
          next.focus();
          activate(next.dataset.projectTab);
        });
      });

      activate('photos');
    })();
  </script>
  <script src="/cookie-consent.js?v=4"></script>
</body>
</html>
